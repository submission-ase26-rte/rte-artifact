experiment:
  name: "Experiment11"
  description: "Test registerHandlingEvent(LocalDateTime completionTime, TrackingId trackingId, VoyageNumber voyageNumber, UnLocode unLocode, HandlingEvent.Type type) - unsloth/Mistral-Small-24B-Instruct-2501"

mode: "dependencies"

class_to_test: "../../data/aster-main/java/aster/GPT-4/Cargotracker/Run-1/src/main/java/org/eclipse/cargotracker/application/internal/DefaultHandlingEventService.java"
max_dependencies: 10

dependencies:
  selection: "structural"     
  top_k: 5             
  use_dependencies_second_phase: true

smart_retry:
  enable: true                       
  max_retries_repair: 2                    
  max_retries_refinement: -1
  min_weighted_pass_rate_threshold: 0.7  # 70% minimum weighted pass rate to regenerate
  min_coverage_threshold: 0.3            # 30% minimum coverage to regenerate

generation_phases:
  run_first_phase: true
  run_second_phase: true
  test_file_for_second_phase: ""
  previous_generated_method: ""
  include_previous_method: false

metrics:
  similarity_threshold: 0.7
  crystalbleu_stopwords: true
  use_dynamic_threshold: true  # If true, computes threshold based on method SLOC
  similarity_weights:          # Optional: custom weights for similarity metrics (must sum to 1.0)
    embedding_similarity: 0.35
    ast_similarity: 0.22
    crystalbleu_similarity: 0.20
    token_similarity: 0.15
    string_similarity: 0.08

test_generation:
  mode: "single_method"
  method_to_test: "registerHandlingEvent"
  method_signature: "registerHandlingEvent(LocalDateTime completionTime, TrackingId trackingId, VoyageNumber voyageNumber, UnLocode unLocode, HandlingEvent.Type type)"

provider:
  name: "chutes"
  model: "unsloth/Mistral-Small-24B-Instruct-2501"

prompt:
  test_generation_prompt: |
    None
  method_regeneration_prompt: "None"
  use_special_instructions: true  # Enables conditional instructions for Servlet/Spring/EJB

paths:
  base_dir: "./"
  java_projects_dir: "../../data/aster-main/java/aster/GPT-4/Cargotracker/Run-1"
  output_dir: "experiments/results"
  logs_dir: "experiments/results/logs"
