experiment:
  name: "Experiment32"
  description: "Test sell(String userID, Integer holdingID, int orderProcessingMode) - unsloth/gemma-3-12b-it"

mode: "dependencies"

class_to_test: "../../data/aster-main/java/aster/GPT-4/Daytrader/Run-1/src/main/java/com/ibm/websphere/samples/daytrader/impl/direct/TradeDirect.java"
max_dependencies: 10

dependencies:
  selection: "structural"     
  top_k: 5             
  use_dependencies_second_phase: true

smart_retry:
  enable: true                       
  max_retries_repair: 2                    
  max_retries_refinement: -1
  min_weighted_pass_rate_threshold: 0.7  # 70% minimum weighted pass rate to regenerate
  min_coverage_threshold: 0.3            # 30% minimum coverage to regenerate

generation_phases:
  run_first_phase: true
  run_second_phase: true
  test_file_for_second_phase: ""
  previous_generated_method: ""
  include_previous_method: false

metrics:
  similarity_threshold: 0.7
  crystalbleu_stopwords: true
  use_dynamic_threshold: true  # If true, computes threshold based on method SLOC

test_generation:
  mode: "single_method"
  method_to_test: "sell"
  method_signature: "sell(String userID, Integer holdingID, int orderProcessingMode)"

provider:
  name: "chutes"
  model: "unsloth/gemma-3-12b-it"

prompt:
  test_generation_prompt: |
    None
  method_regeneration_prompt: "None"
  use_special_instructions: true  # Enables conditional instructions for Servlet/Spring/EJB

paths:
  base_dir: "./"
  java_projects_dir: "../../data/aster-main/java/aster/GPT-4/Daytrader/Run-1"
  output_dir: "results/outputs"
  logs_dir: "results/logs"
